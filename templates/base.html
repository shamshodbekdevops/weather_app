<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shamshod_Weather App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .nav-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .nav-btn {
            border-radius: 10px;
            padding: 12px 20px;
            margin: 5px;
            transition: all 0.3s ease;
        }
        .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .search-box {
            border-radius: 25px;
            border: 2px solid #667eea;
            padding: 12px 20px;
        }
        .btn-search {
            border-radius: 25px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }
    </style>
</head>
<body>
    <div class="container py-4">
        <!-- Navigation -->
        <div class="nav-card p-3">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <h3 class="mb-0 text-primary">
                        <i class="fas fa-cloud-sun me-2"></i>Shamshod_Weather App
                    </h3>
                </div>
                <div class="col-md-5">
                    <!-- BIRTA FORM BUTUN SAYT UCHUN -->
                    <form method="post" class="d-flex" id="globalSearchForm">
                        {% csrf_token %}
                        <input type="text" name="city" class="form-control search-box me-2" 
                               placeholder="Shahar nomi..." value="{{ current_city|default:'Tashkent' }}" required
                               id="cityInput">
                        <button class="btn btn-search text-white" type="submit">
                            <i class="fas fa-search"></i> Qidirish
                        </button>
                    </form>
                </div>
                <div class="col-md-3">
                    <div class="d-flex justify-content-end">
                        <a href="{% url 'current_weather' %}" class="btn btn-outline-primary nav-btn {% if request.resolver_match.url_name == 'current_weather' %}active{% endif %}">
                            <i class="fas fa-home me-1"></i> Asosiy
                        </a>
                        <a href="{% url 'air_pollution' %}" class="btn btn-outline-warning nav-btn {% if request.resolver_match.url_name == 'air_pollution' %}active{% endif %}">
                            <i class="fas fa-industry me-1"></i> AQI
                        </a>
                        <a href="{% url 'five_day_forecast' %}" class="btn btn-outline-info nav-btn {% if request.resolver_match.url_name == 'five_day_forecast' %}active{% endif %}">
                            <i class="fas fa-calendar-alt me-1"></i> 5 Kun
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Content -->
        {% block content %}{% endblock %}
    </div>

    <script>
        // Formani hozirgi sahifaga yo'naltirish
        document.getElementById('globalSearchForm').addEventListener('submit', function(e) {
            const currentPath = window.location.pathname;
            this.action = currentPath;
        });

        // Shahar nomini saqlab qolish
        document.addEventListener('DOMContentLoaded', function() {
            const savedCity = localStorage.getItem('currentCity');
            if (savedCity) {
                document.getElementById('cityInput').value = savedCity;
            }
            
            // Shahar o'zgarganda saqlash
            document.getElementById('cityInput').addEventListener('change', function() {
                localStorage.setItem('currentCity', this.value);
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
